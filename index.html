<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街机乒乓球 - 双人对战</title>
    <link rel="stylesheet" href="css/style.css?v=20260612001">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="960" height="600"></canvas>
        
        <div id="startMenu" class="menu">
            <h1 class="title">🏓 街机乒乓球</h1>
            <p class="subtitle">找回街机厅的快乐时光</p>
            <div class="menu-buttons">
                <button id="btnSingle" class="menu-btn">🎮 单人模式</button>
                <button id="btnDouble" class="menu-btn">👥 双人对战</button>
                <button id="btnCustom" class="menu-btn">🔧 球拍定制</button>
            </div>
            <div class="controls-info">
                <h3>操作说明</h3>
                <div class="player-controls">
                    <div class="control-group">
                        <h4>玩家1 (左侧)</h4>
                        <p><span class="key">W</span> / <span class="key">S</span> 上下移动</p>
                        <p><span class="key">D</span> 扣杀</p>
                    </div>
                    <div class="control-group">
                        <h4>玩家2 (右侧)</h4>
                        <p><span class="key">↑</span> / <span class="key">↓</span> 上下移动</p>
                        <p><span class="key">L</span> 扣杀</p>
                    </div>
                </div>
                <p class="tip">💡 扣杀需在球处于高点且靠近球拍时触发</p>
            </div>
        </div>

        <div id="pauseMenu" class="menu hidden">
            <h2>⏸️ 游戏暂停</h2>
            <div class="menu-buttons">
                <button id="btnResume" class="menu-btn">继续游戏</button>
                <button id="btnRestart" class="menu-btn">重新开始</button>
                <button id="btnMainMenu" class="menu-btn">返回主菜单</button>
            </div>
        </div>

        <div id="gameOverMenu" class="menu hidden">
            <h2 id="winnerText">🎉 游戏结束</h2>
            <p id="finalScore">最终比分: 0 - 0</p>
            <div class="menu-buttons">
                <button id="btnPlayAgain" class="menu-btn">再来一局</button>
                <button id="btnBackToMenu" class="menu-btn">返回主菜单</button>
            </div>
        </div>

        <div id="restCountdown" class="countdown hidden">
            <div class="countdown-content">
                <h2>局间休息</h2>
                <p id="restScore">当前比分: 0 - 0</p>
                <p class="countdown-number" id="countdownNum">5</p>
            </div>
        </div>

        <div id="customMenu" class="menu hidden">
            <h2 class="custom-title">🔧 球拍定制</h2>
            <div class="custom-layout">
                <div class="custom-panel">
                    <div class="param-group">
                        <label class="param-label">球拍重量</label>
                        <div class="slider-row">
                            <span class="param-min">80g</span>
                            <input type="range" id="weightSlider" class="param-slider" min="80" max="120" value="100" step="1">
                            <span class="param-max">120g</span>
                        </div>
                        <div class="param-current" id="weightValue">100g</div>
                        <p class="param-hint">越重扣杀越强，但移动越慢</p>
                    </div>
                    <div class="param-group">
                        <label class="param-label">拍面大小</label>
                        <div class="slider-row">
                            <span class="param-min">80%</span>
                            <input type="range" id="faceSlider" class="param-slider" min="80" max="120" value="100" step="1">
                            <span class="param-max">120%</span>
                        </div>
                        <div class="param-current" id="faceValue">100%</div>
                        <p class="param-hint">拍面越大击球范围越广，但移动越慢</p>
                    </div>
                    <div class="param-group">
                        <label class="param-label">胶皮弹性</label>
                        <div class="elasticity-btns">
                            <button class="elasticity-btn" data-value="0">低弹性</button>
                            <button class="elasticity-btn active" data-value="1">中弹性</button>
                            <button class="elasticity-btn" data-value="2">高弹性</button>
                        </div>
                        <p class="param-hint">弹性越高球速越快，但控制越难</p>
                    </div>
                    <div class="preset-section">
                        <label class="param-label">预设方案</label>
                        <div class="preset-row">
                            <button class="preset-btn" data-index="0">空槽1</button>
                            <button class="save-preset-btn" data-index="0">保存</button>
                        </div>
                        <div class="preset-row">
                            <button class="preset-btn" data-index="1">空槽2</button>
                            <button class="save-preset-btn" data-index="1">保存</button>
                        </div>
                        <div class="preset-row">
                            <button class="preset-btn" data-index="2">空槽3</button>
                            <button class="save-preset-btn" data-index="2">保存</button>
                        </div>
                    </div>
                </div>
                <div class="radar-panel">
                    <h3 class="radar-title">手感预览</h3>
                    <canvas id="radarCanvas" width="280" height="280"></canvas>
                </div>
            </div>
            <button id="btnCustomBack" class="menu-btn custom-back-btn">返回主菜单</button>
        </div>

        <div id="gameHUD" class="hud hidden">
            <div class="score-display">
                <div class="score-left">
                    <span class="player-name">玩家1</span>
                    <span class="score" id="score1">0</span>
                </div>
                <div class="sets-display">
                    <span id="sets1">0</span>
                    <span class="sets-label">局</span>
                    <span id="sets2">0</span>
                </div>
                <div class="score-right">
                    <span class="score" id="score2">0</span>
                    <span class="player-name">玩家2</span>
                </div>
            </div>
            <div class="rally-display" id="rallyDisplay">
                <span class="rally-label">对拉</span>
                <span class="rally-count" id="rallyCount">0</span>
                <span class="rally-label">板</span>
            </div>
            <button id="btnPause" class="pause-btn">⏸️</button>
        </div>
    </div>

    <script src="js/config.js?v=20260612001"></script>
    <script src="js/effects.js?v=20260612001"></script>
    <script src="js/ball.js?v=20260612001"></script>
    <script src="js/paddle.js?v=20260612001"></script>
    <script src="js/ai.js?v=20260612001"></script>
    <script src="js/game.js?v=20260612001"></script>
    <script src="js/paddle_customizer.js?v=20260612001"></script>
    <script src="js/ui.js?v=20260612001"></script>
    <script src="js/main.js?v=20260612001"></script>
</body>
</html>
